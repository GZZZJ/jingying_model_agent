name: full_modeling
description: Full automated business modeling workflow.
stages:
  - validate_config
  - sample_check
  - feature_metadata
  - feature_prescreen
  - build_wide_sql
  - feature_refine
  - train_baseline
  - evaluate
  - compare
  - report
stage_contracts:
  validate_config:
    accepted_artifact_sets:
      - [configs_snapshot]
      - [configs_snapshot/*]
  sample_check:
    accepted_artifact_sets:
      - [sample_check/sample_summary.json, sample_check/sample_check_report.md]
      - [sample_check/sample_split_summary.csv, sample_check/label_distribution.csv, sample_check/segment_distribution.csv]
  feature_metadata:
    required_artifacts:
      - feature_metadata/*
  feature_prescreen:
    accepted_artifact_sets:
      - [feature_selection/prescreen_run_summary.json, feature_selection/prescreen_final_remain_features.json]
      - [feature_selection/*_run_summary.json, feature_selection/*_final_remain_features.json]
  build_wide_sql:
    accepted_artifact_sets:
      - [queries/*.sql]
      - [feature_selection/wide_sql_summary.json]
  feature_refine:
    accepted_artifact_sets:
      - [feature_selection/final_features.txt]
      - [feature_selection/final_500_features.txt]
  train_baseline:
    accepted_artifact_sets:
      - [modeling/*/metrics_train_valid.json, modeling/*/actual_feature_list.txt, modeling/*/feature_importance.csv]
      - [modeling/*/train_metrics.json]
  evaluate:
    required_artifacts:
      - evaluation/evaluation_summary.json
  compare:
    accepted_artifact_sets:
      - [evaluation/champion_challenger.json]
      - [evaluation/benchmark_uplift.csv]
  report:
    accepted_artifact_sets:
      - [reports/model_report.xlsx, reports/model_report.md, reports/model_card.md, reports/executive_summary.md]
      - [reports/model_report.md, reports/model_card.md, reports/executive_summary.md]
gates:
  before_train:
    require:
      - sample_check.status == done
      - feature_refine.status == done
      - feature_selection.final_features.exists == true
    stop_if:
      - audit.high_risk_leakage == true
  before_report:
    require:
      - evaluation.status in [done, scaffold]
      - audit.artifact_manifest.exists == true
