version: 1
rules:
  - id: sql-dry-run-approval
    title: SQL must be generated and approved before DP pulls
    target: guardrail
    status: enforced
    enforcement: rmw DP-backed feature commands require dry-run review before --sql-approved execution.
    source:
      type: policy
      path: docs/data_and_sql_policy.md
  - id: imported-scaffold-not-local-evidence
    title: Imported or scaffold artifacts are not local reproduction evidence
    target: guardrail
    status: enforced
    enforcement: rmw run audit classifies imported and scaffold evidence separately from complete.
    source:
      type: policy
      path: AGENTS.md
  - id: run-no-overwrite-without-force
    title: Runs must not be overwritten without explicit force
    target: guardrail
    status: enforced
    enforcement: rmw run init refuses an existing run_id unless --force is provided.
    source:
      type: policy
      path: AGENTS.md
  - id: stage-closure-source-of-truth
    title: Stage closure uses run_state and artifact_manifest as source of truth
    target: guardrail
    status: enforced
    enforcement: rmw run audit validates stage status against registered artifacts and workflow contracts.
    source:
      type: adr
      path: docs/adr/0001-harness-hardening.md
  - id: gcard-example-boundary
    title: Fujie GCard remains a case project, not reusable workbench logic
    target: guardrail
    status: enforced
    enforcement: tests cover GCard decoupling and reusable code remains under src/risk_model_workbench.
    source:
      type: policy
      path: AGENTS.md
  - id: explicit-data-source-mode
    title: Modeling requests must preserve explicit data_source_mode
    target: guardrail
    status: enforced
    enforcement: request validation and runtime materialization resolve remote_table versus local_feather before run execution.
    source:
      type: design
      path: docs/superpowers/specs/2026-06-25-resource-aware-feature-selection-design.md
  - id: local-feather-not-tracked
    title: Local feather payloads are runtime inputs, not tracked evidence
    target: guardrail
    status: enforced
    enforcement: local feather profiling records JSON metadata only; feather payloads remain under ignored data/cache paths.
    source:
      type: design
      path: docs/superpowers/specs/2026-06-25-resource-aware-feature-selection-design.md
  - id: resource-plan-before-dp-pull
    title: DP feature-selection pulls require planning evidence
    target: guardrail
    status: planned
    enforcement: feature-selection stages must persist data source, environment, resource, sampling, batch, and SQL evidence before bulk pulls.
    source:
      type: design
      path: docs/superpowers/specs/2026-06-25-resource-aware-feature-selection-design.md
  - id: platform-data-pull-engine
    title: Feature-selection data-pull engine is platform-aware
    target: guardrail
    status: enforced
    enforcement: pull_engine does not auto-select a remote pull engine on Windows/macOS, defaults to TMLSQLClient on Linux/other platforms, and treats local_feather as a separate existing-file data source rather than a pull engine.
    source:
      type: design
      path: docs/superpowers/specs/2026-06-25-resource-aware-feature-selection-design.md
