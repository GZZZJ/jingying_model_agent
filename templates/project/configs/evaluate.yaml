evaluation:
  label_column: {{target_column}}
  score_columns:
    - model_score
    - gcard_v2
    - gcard_v4
    - gcard_v5
    - gcard_v6
  split_column: final_flag
  time_column: {{time_column}}
  period_column: {{period_column}}
  segment_columns:
    - blue_customer_flag
    - zc_level

metrics:
  - auc
  - ks
  - psi
  - decile_lift
  - monotonicity

risk_observation:
  enabled: true
  columns:
    - prc_amt_xz_30d_3m
    - ovd_amt_xz_30d_3m
