project:
  name: {{project_name}}
  display_name: {{display_name}}
  scenario: {{scenario}}
  created_date: {{created_date}}
  template: {{template}}

references:
  planning_doc: ../../doc/AI经营建模Agent规划.md
  model_inventory: ../../doc/现有经营模型梳理.md
  gcard_workbook: ../../doc/复借G卡模型文档.xlsx
  feature_select_v2: ../../vendor/feature-select-v2

data:
  source_table: {{sample_table}}
  raw_path: data/raw/sample.feather
  feature_path: data/raw/features.feather
  id_columns:
    - uid
    - mdl_dte
  time_column: {{time_column}}
  period_column: {{period_column}}
  target_column: {{target_column}}
  label_definition: 观察日30天内是否发起
  sample_logic: 可经营、当前未逾期用户、重资产订单

split:
  source_column: final_flag
  ins_values:
    - DEV
  oos_values:
    - DEV-OOS
  oot_values:
    - OOT
    - OOT-OOS

segments:
  - name: all
    display_name: 全客群
    filter: null
  - name: e2e3
    display_name: E2/E3客群
    filter: "blue_customer_flag in ['E2', 'E3']"
  - name: b2
    display_name: B2客群
    filter: "blue_customer_flag == 'B2'"

open_questions:
