evaluation:
  label_column: ftr_30d_ord_flag
  score_columns:
    - model_score
    - gcard_v2
    - gcard_v4
    - gcard_v5
    - gcard_v6
  split_column: final_flag
  time_column: mdl_dte
  period_column: ds
  segment_columns:
    - blue_customer_flag
    - zc_level
  segment_mapping:
    blue_customer_flag:
      B2: 流失户
      E2: 次新户
      E3: 老户
    report_groups:
      老户次新:
        filter: "blue_customer_flag in ['E2', 'E3']"
      流失户:
        filter: "blue_customer_flag == 'B2'"

metrics:
  - auc
  - ks
  - psi
  - decile_lift
  - monotonicity

risk_observation:
  enabled: true
  status: pending_mob_definition_confirmation
  columns:
    - prc_amt_xz_30d_3m
    - ovd_amt_xz_30d_3m
  pending_questions:
    - MOB1/MOB3人头逾期率的分子、分母、去重主键和观察窗口。
    - MOB1/MOB3金额逾期率的本金口径、逾期金额口径和是否可直接使用现有金额字段。
