training:
  default_algorithm: lightgbm
  random_seed: 0
  feature_list_path: /Users/guzijun/Desktop/AI攻坚/risk_model_workbench/projects/2026-05-fujie-gcard-v1/runs/2026-06-26-gcard-main-lgbm-rerun/feature_selection/final_features.txt
  label_column: ftr_30d_ord_flag
  split_column: final_flag
  train_values:
  - DEV
  # 早停验证集用 DEV-OOS（同时间窗 holdout），避免用 OOT 早停导致 OOT 评估被乐观污染。
  # materialize 默认 valid=OOT[:1] 会把 OOT 同时用于早停与评估，此处修正为 DEV-OOS。
  valid_values:
  - DEV-OOS
  oos_values:
  - DEV-OOS
  - OOT
  - OOT-OOS
  experiments:
  - name: main_lgbm
    display_name: 全客群复借G卡主模型，分客群只作为评估切片，不单独训练分客群模型
    segment: all
    segment_filter: null
    algorithm: lightgbm
    method: lightgbm
    description: 全客群复借G卡主模型，分客群只作为评估切片，不单独训练分客群模型
    sample_weight: null
  candidate_targets:
  - ftr_30d_ord_flag
  sample_variants:
  - all
  - e2e3
  - b2
  runtime_step_params:
    auc_ks: {}
    baseline_importance_filter:
      importance_type: gain
      keep_top_n: 500
    champion_challenger: {}
    constant_value_filter:
      max_unique_values: 1
    correlation_dedup:
      method: spearman
      max_abs_corr: 0.8
    cross_gain_matrix:
      bins: 10
    decile_lift:
      bins: 10
    feature_availability_filter: {}
    feature_gain_summary: {}
    feature_metadata_export: {}
    feature_quality_prescreen:
      require_sql_approval: true
    field_contract: {}
    iv_filter:
      min_iv: 0.005
    key_uniqueness: {}
    lightgbm_binary_training:
      early_stopping_rounds: 50
      max_auc_gap: 0.02
    missing_rate_filter:
      threshold: 0.9
    model_report: {}
    monthly_label_distribution:
      min_samples_per_month: 50
    monthly_stability:
      min_samples: 50
    null_importance_filter:
      null_rounds: 20
      null_percentile: 75
      score_threshold: 1.0
    score_psi:
      bins: 10
      warn_psi: 0.2
    segment_distribution: {}
    segment_metrics: {}
    sql_review_gate:
      block_on_high_risk: true
    wide_sql_generation: {}
input:
  feather_path: /Users/guzijun/gcard_1pct_export/sample_50pct.feather
  id_columns:
  - uid
  - mdl_dte
  base_columns:
  - uid
  - mdl_dte
  - ds
  - final_flag
  - blue_customer_flag
  - zc_level
  - ftr_30d_ord_flag
  - ftr_30d_ord_amt
  - prc_amt_xz_30d_3m
  - ovd_amt_xz_30d_3m
  - rand_flag0
  - gcard_v2
  - gcard_v4
  - gcard_v5
  - gcard_v6
  label_column: ftr_30d_ord_flag
  split_column: final_flag
  historical_score_columns:
  - gcard_v2
  - gcard_v4
  - gcard_v5
  - gcard_v6
preprocessing:
  missing_sentinels:
  - -999
  - -998
  min_non_null_rate: 0.01
  drop_constant: true
lightgbm:
  objective: binary
  metric: auc
  learning_rate: 0.05
  num_leaves: 31
  max_depth: 5
  min_child_samples: 100
  subsample: 0.7
  colsample_bytree: 0.7
  reg_alpha: 0.1
  reg_lambda: 1.0
  num_boost_round: 1000
  early_stopping_rounds: 50
