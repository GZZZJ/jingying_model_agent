feature_refine:
  input:
    # local_feather 模式：宽表已以 feather 存在，清空 wide_table/feature_map，
    # 使 load_feature_list 回退到 local_feather_path 读取候选特征列
    wide_table: null
    feature_map: null
    label_column: ftr_30d_ord_flag
    split_column: final_flag
    train_value: DEV
    valid_value: OOT
    id_columns:
    - uid
    - mdl_dte
    base_columns:
    - uid
    - mdl_dte
    - ds
    - blue_customer_flag
    - ftr_30d_ord_flag
    - ftr_30d_ord_amt
    - prc_amt_xz_30d_3m
    - ovd_amt_xz_30d_3m
    - final_flag
    - zc_level
    - gcard_v2
    - gcard_v4
    - gcard_v5
    - gcard_v6
    - rand_flag0
    - rand_flag1
    - rand_flag2
    - rand_flag3
    - rand_flag4
    - rand_flag5
    local_feather_path: /Users/guzijun/gcard_1pct_export/sample_50pct.feather
  sampling:
    where: ds is not null and final_flag in ('DEV','OOT') and ftr_30d_ord_flag in
      (0,1) and rand_flag0 < 0.02
    max_rows: 200000
  dp_feather:
    dataset_id: feature_refine_wide_sample
    description: 特征初筛后宽表抽样，用于D03随机重要性、D04 Null Importance 和D05基线重要性筛选。
    data_dir: /Users/guzijun/Desktop/AI攻坚/risk_model_workbench/projects/2026-05-fujie-gcard-v1/runs/2026-06-26-gcard-main-lgbm-rerun/data/dp_feather/feature_refine
    metadata_dir: /Users/guzijun/Desktop/AI攻坚/risk_model_workbench/projects/2026-05-fujie-gcard-v1/runs/2026-06-26-gcard-main-lgbm-rerun/feature_selection/dp_feather_datasets/feature_refine
  output_dir: /Users/guzijun/Desktop/AI攻坚/risk_model_workbench/projects/2026-05-fujie-gcard-v1/runs/2026-06-26-gcard-main-lgbm-rerun/feature_selection/refine
  random_seed: 0
  target_feature_count: 500
  preprocessing:
    missing_sentinels:
    - -999
    - -998
    min_non_null_rate: 0.09999999999999998
    drop_constant: true
    max_unique_values: 1
  global_corr:
    enabled: true
    threshold: 0.8
    score_metric: univariate_auc
    method: spearman
    max_abs_corr: 0.8
  d03_random_importance:
    enabled: false
  d04_null_importance:
    enabled: true
    max_features_for_null_importance: 2500
    real_rounds: 3
    null_rounds: 20
    null_percentile: 75
    score_threshold: 1.0
  d05_baseline_importance:
    enabled: true
    importance_type: gain
    keep_top_n: 500
  lightgbm:
    objective: binary
    metric: auc
    learning_rate: 0.05
    num_leaves: 31
    max_depth: 5
    min_child_samples: 100
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 0.1
    reg_lambda: 1.0
    num_boost_round: 400
    early_stopping_rounds: 50
  runtime_request:
    data_source_mode: local_feather
    sample_location: /Users/guzijun/gcard_1pct_export/sample_50pct.feather
    step_params:
      auc_ks: {}
      baseline_importance_filter:
        importance_type: gain
        keep_top_n: 500
      champion_challenger: {}
      constant_value_filter:
        max_unique_values: 1
      correlation_dedup:
        method: spearman
        max_abs_corr: 0.8
      cross_gain_matrix:
        bins: 10
      decile_lift:
        bins: 10
      feature_availability_filter: {}
      feature_gain_summary: {}
      feature_metadata_export: {}
      feature_quality_prescreen:
        require_sql_approval: true
      field_contract: {}
      iv_filter:
        min_iv: 0.005
      key_uniqueness: {}
      lightgbm_binary_training:
        early_stopping_rounds: 50
        max_auc_gap: 0.02
      missing_rate_filter:
        threshold: 0.9
      model_report: {}
      monthly_label_distribution:
        min_samples_per_month: 50
      monthly_stability:
        min_samples: 50
      null_importance_filter:
        null_rounds: 20
        null_percentile: 75
        score_threshold: 1.0
      score_psi:
        bins: 10
        warn_psi: 0.2
      segment_distribution: {}
      segment_metrics: {}
      sql_review_gate:
        block_on_high_risk: true
      wide_sql_generation: {}
